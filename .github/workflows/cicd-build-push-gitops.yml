name: Build, Push, Generate YAML, Notify ArgoCD

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      app_version: ${{ steps.semver.outputs.version }}
      app_version_compact: ${{ steps.version_tag.outputs.version_compact }}
      image_ref: ${{ steps.export_image.outputs.image_ref }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Resolve version bump type
        id: bump
        env:
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          BUMP_TYPE="patch"

          if echo "$COMMIT_MESSAGE" | grep -qi "tag-major"; then
            BUMP_TYPE="major"
          elif echo "$COMMIT_MESSAGE" | grep -qi "tag-minor"; then
            BUMP_TYPE="minor"
          elif echo "$COMMIT_MESSAGE" | grep -qi "tag-patch"; then
            BUMP_TYPE="patch"
          fi

          echo "bump_type=${BUMP_TYPE}" >> "$GITHUB_OUTPUT"

      - name: Bump package version
        id: semver
        run: |
          npm version "${{ steps.bump.outputs.bump_type }}" --no-git-tag-version
          VERSION=$(node -p "require('./package.json').version")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Build compact version tag
        id: version_tag
        run: |
          VERSION_COMPACT=$(echo "${{ steps.semver.outputs.version }}" | tr -d '.')
          if [ -z "$VERSION_COMPACT" ]; then
            echo "Version compact tag is empty"
            exit 1
          fi
          echo "version_compact=${VERSION_COMPACT}" >> "$GITHUB_OUTPUT"

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add package.json

          if [ -f package-lock.json ]; then
            git add package-lock.json
          fi

          if git diff --cached --quiet; then
            echo "No version change to commit."
            exit 0
          fi

          git commit -m "ci: bump version to v${{ steps.semver.outputs.version }} [skip ci]"
          git push

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Log in to container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.DOCKER_REGISTRY }}
          username: ${{ secrets.DOCKER_REGISTRY_USERNAME }}
          password: ${{ secrets.DOCKER_REGISTRY_PASSWORD }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            ${{ vars.DOCKER_REGISTRY }}/${{ vars.DOCKER_IMAGE_REPOSITORY }}:${{ steps.version_tag.outputs.version_compact }}
            ${{ vars.DOCKER_REGISTRY }}/${{ vars.DOCKER_IMAGE_REPOSITORY }}:sha-${{ github.sha }}
            ${{ vars.DOCKER_REGISTRY }}/${{ vars.DOCKER_IMAGE_REPOSITORY }}:latest

      - name: Export image reference (version tag)
        id: export_image
        run: |
          IMAGE_REF="${{ vars.DOCKER_REGISTRY }}/${{ vars.DOCKER_IMAGE_REPOSITORY }}:${{ steps.version_tag.outputs.version_compact }}"
          echo "image_ref=${IMAGE_REF}" >> "$GITHUB_OUTPUT"

  generate-and-commit-manifests:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync to latest branch head
        run: |
          git checkout "${GITHUB_REF_NAME}"
          git pull origin "${GITHUB_REF_NAME}"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Update image in deploy/services.json
        env:
          IMAGE_REF: ${{ vars.DOCKER_REGISTRY }}/${{ vars.DOCKER_IMAGE_REPOSITORY }}:${{ needs.build-and-push.outputs.app_version_compact }}
        run: |
          node -e '
          const fs = require("fs");
          const path = "deploy/services.json";

          if (!process.env.IMAGE_REF) {
            throw new Error("IMAGE_REF is empty. Check build-and-push job outputs and registry variables.");
          }

          const config = JSON.parse(fs.readFileSync(path, "utf8"));
          if (!Array.isArray(config.deployments) || config.deployments.length === 0) {
            throw new Error("services.json must contain deployments array");
          }

          config.deployments = config.deployments.map((deployment, index) => {
            if (!deployment || typeof deployment !== "object") {
              throw new Error(`Deployment at index ${index} is not a valid object.`);
            }
            if (!deployment.name) {
              throw new Error(`Deployment at index ${index} is missing name.`);
            }
            if (!deployment.containerPort) {
              throw new Error(`Deployment at index ${index} (${deployment.name}) is missing containerPort.`);
            }

            return {
              ...deployment,
              image: process.env.IMAGE_REF,
            };
          });

          fs.writeFileSync(path, JSON.stringify(config, null, 2) + "\n");
          '

      - name: Generate deployment files
        run: npm run generate:deploy-yamls

      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add deploy/services.json deploy/ymls

          if git diff --cached --quiet; then
            echo "No manifest changes to commit."
            exit 0
          fi

          git commit -m "ci: update image and generated kubernetes manifests [skip ci]"
          git push

  notify-argocd:
    runs-on: ubuntu-latest
    needs:
      - build-and-push
      - generate-and-commit-manifests
    steps:
      - name: Notify Argo CD via webhook
        env:
          ARGOCD_WEBHOOK_URL: ${{ secrets.ARGOCD_WEBHOOK_URL }}
          DEPLOY_ENV: ${{ vars.DEPLOY_ENV }}
          DOCKER_REGISTRY: ${{ vars.DOCKER_REGISTRY }}
          DOCKER_IMAGE_REPOSITORY: ${{ vars.DOCKER_IMAGE_REPOSITORY }}
          APP_VERSION: ${{ needs.build-and-push.outputs.app_version }}
          APP_VERSION_COMPACT: ${{ needs.build-and-push.outputs.app_version_compact }}
          IMAGE_REF: ${{ needs.build-and-push.outputs.image_ref }}
        run: |
          if [ -z "$ARGOCD_WEBHOOK_URL" ]; then
            echo "ARGOCD_WEBHOOK_URL is not configured."
            exit 1
          fi

          ENVIRONMENT="${DEPLOY_ENV:-production}"
          FINAL_IMAGE_REF="$IMAGE_REF"

          if [ -z "$FINAL_IMAGE_REF" ]; then
            FINAL_IMAGE_REF="${DOCKER_REGISTRY}/${DOCKER_IMAGE_REPOSITORY}:${APP_VERSION_COMPACT}"
          fi

          if [ -z "$FINAL_IMAGE_REF" ] || [ "$FINAL_IMAGE_REF" = "/:" ]; then
            echo "Unable to resolve image reference for ArgoCD payload."
            exit 1
          fi

          PAYLOAD=$(cat <<EOF
          {
            "source": "github-actions",
            "event": "manifests-updated",
            "environment": "${ENVIRONMENT}",
            "repository": "${GITHUB_REPOSITORY}",
            "branch": "${GITHUB_REF_NAME}",
            "commitSha": "${GITHUB_SHA}",
            "version": "${APP_VERSION}",
            "versionTag": "${APP_VERSION_COMPACT}",
            "image": "${FINAL_IMAGE_REF}",
            "runId": "${GITHUB_RUN_ID}",
            "runUrl": "https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          }
          EOF
          )

          curl --fail --show-error --location \
            --request POST \
            --header "Content-Type: application/json" \
            --data "$PAYLOAD" \
            "$ARGOCD_WEBHOOK_URL"
